insmod part_gpt
insmod fat
insmod search_fs_file
search --no-floppy --file --set=esp /grub/grub.cfg
# Keep prefix on the standalone memdisk so GRUB can load embedded modules.
# If prefix points to the USB ESP, GRUB looks for /grub/x86_64-efi/*.mod there.
set prefix=(memdisk)/boot/grub
configfile ($esp)/grub/grub.cfg

set default=0
set timeout=3
set timeout_style=menu

insmod part_gpt
insmod fat
insmod gzio
insmod linux
insmod search_fs_file
search --no-floppy --file --set=root /vmlinuz-lts

menuentry 'Alpine Linux XFCE (LightDM)' {
    linux /vmlinuz-lts root=UUID=256ec06d-3273-413f-8104-a7bb97f43694 ro rootfstype=ext4 rootwait rootdelay=5 modules=ata,base,ext4,kms,mmc,nvme,scsi,usb,virtio console=tty0
    initrd /initramfs-lts
}

menuentry 'Alpine Linux XFCE (safe graphics)' {
    linux /vmlinuz-lts root=UUID=256ec06d-3273-413f-8104-a7bb97f43694 ro rootfstype=ext4 rootwait rootdelay=5 modules=ata,base,ext4,kms,mmc,nvme,scsi,usb,virtio console=tty0 nomodeset
    initrd /initramfs-lts
}
