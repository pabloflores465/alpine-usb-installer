set timeout=5
set default=0
insmod part_gpt
insmod fat
insmod gzio
insmod normal
insmod linux
search --no-floppy --fs-uuid --set=boot 6093-1DB7
menuentry 'Alpine Linux XFCE (lts)' {
    linux ($boot)/vmlinuz-lts root=UUID=81b7b7d1-0bbe-4c34-b469-33cdc20788c3 ro rootfstype=ext4 rootwait rootdelay=10 modules=sd-mod,usb-storage,ext4,usb console=tty0
    initrd ($boot)/initramfs-lts
}
menuentry 'Alpine Linux XFCE (virt fallback)' {
    linux ($boot)/vmlinuz-virt root=UUID=81b7b7d1-0bbe-4c34-b469-33cdc20788c3 ro rootfstype=ext4 rootwait rootdelay=10 modules=sd-mod,usb-storage,ext4,usb console=tty0
    initrd ($boot)/initramfs-virt
}
